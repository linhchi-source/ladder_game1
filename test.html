<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") {
          alert("Climb up ladder");
        }

        if (e.key === "ArrowDown") {
          alert("Climb down ladder");
        }
      });
    </script>
  </body>
</html>
